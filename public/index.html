<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LAN File Share</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/qr.css"></head><body><main class="app"><header><div><small>LOCAL NETWORK</small><h1>LAN File Share</h1></div><button id="refreshButton" title="更新">↻</button></header><section class="info"><div class="connection"><div><b>相手のPCで開くURL</b><p id="networkUrls">確認中...</p><b>共有フォルダー</b><p id="sharedFolder">確認中...</p></div><div class="qr-panel"><b>スマホ接続用QR</b><div id="qrCode" aria-label="スマホ接続用QRコード"></div><p id="qrUrl"></p></div></div></section><label class="dropzone" id="dropzone"><input id="fileInput" type="file" multiple><strong>↑　ファイルをここへドロップ</strong><span>またはクリックして選択</span></label><div id="progressArea"></div><section><div class="heading"><h2>共有ファイル</h2><span id="fileCount">0 件</span></div><div class="bulkbar"><label><input id="selectAll" type="checkbox"> すべて選択</label><span id="selectedCount">0 件選択中</span><button id="bulkDownload" class="bulk-download" disabled>選択を一括DL</button><button id="bulkDelete" class="bulk-delete" disabled>選択を一括削除</button></div><div id="fileList"></div></section></main><template id="fileTemplate"><article class="file-row"><div class="file-main"><input class="select-file" type="checkbox" aria-label="選択"><i>□</i><div class="file-meta"><h3></h3><p class="details"></p><p class="path"></p></div></div><div class="actions"><a title="ダウンロード">↓</a><button title="削除">×</button></div></article></template><script src="/qrcode.js"></script><script src="/app.js"></script></body></html>
