<!doctype html>
<html lang="ja" data-theme="light-theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LAN File Share</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/media-preview.css">
  <link rel="stylesheet" href="/qr.css">
  <link rel="stylesheet" href="/light-theme.css">
  <link rel="stylesheet" href="/lime-light.css">
</head>
<body>
  <main class="app">
    <header>
      <div class="brand-mark" aria-hidden="true">L</div>
      <div class="brand-copy">
        <small>LOCAL NETWORK / DIRECT TRANSFER</small>
        <h1>LAN FILE <em>SHARE.</em></h1>
        <p>同一Wifi内のファイル共有を、もっと速く、もっとシンプルに。</p>
      </div>
      <div class="header-tools">
        <div class="theme-switcher" role="radiogroup" aria-label="表示テーマ">
          <button type="button" class="theme-option" data-theme-value="dark-theme" role="radio" aria-checked="false">DARK</button>
          <button type="button" class="theme-option" data-theme-value="light-theme" role="radio" aria-checked="true">LIGHT</button>
          <button type="button" class="theme-option" data-theme-value="lime-light" role="radio" aria-checked="false">LIME</button>
        </div>
      </div>
      <button id="refreshButton" title="更新" aria-label="更新">↻</button>
    </header>

    <section class="info">
      <div class="info-index" aria-hidden="true">01</div>
      <div class="connection">
        <div class="connection-data">
          <span class="section-kicker">CONNECTION</span>
          <b>相手のPCで開くURL</b>
          <p id="networkUrls">確認中...</p>
          <b>共有フォルダー</b>
          <p id="sharedFolder">確認中...</p>
        </div>
        <div class="qr-panel">
          <b>SCAN TO CONNECT</b>
          <div id="qrCode" aria-label="スマホ接続用QRコード"></div>
          <p id="qrUrl"></p>
        </div>
      </div>
    </section>

    <label class="dropzone" id="dropzone">
      <input id="fileInput" type="file" multiple>
      <span class="drop-index">02 / UPLOAD</span>
      <span class="upload-symbol" aria-hidden="true">↑</span>
      <strong>DROP FILES <em>HERE.</em></strong>
      <span>ファイルをドロップ、またはクリックして選択</span>
    </label>

    <div id="progressArea"></div>

    <section class="files-section">
      <div class="heading">
        <div><span class="section-kicker">03 / SHARED STORAGE</span><h2>共有ファイル</h2></div>
        <span id="fileCount">0 件</span>
      </div>
      <div class="bulkbar">
        <label><input id="selectAll" type="checkbox"> すべて選択</label>
        <span id="selectedCount">0 件選択中</span>
        <button id="bulkDownload" class="bulk-download" disabled>選択を一括DL</button>
        <button id="bulkDelete" class="bulk-delete" disabled>選択を一括削除</button>
      </div>
      <div id="fileList"></div>
    </section>
  </main>

  <template id="fileTemplate">
    <article class="file-row">
      <div class="file-main">
        <input class="select-file" type="checkbox" aria-label="選択">
        <div class="media-preview"></div>
        <div class="file-meta"><h3></h3><p class="details"></p><p class="path"></p></div>
      </div>
      <div class="actions">
        <button class="reveal-file" title="ファイルの場所を開く" aria-label="ファイルの場所を開く"><img class="folder-icon" src="/folder.svg" alt="" aria-hidden="true"></button>
        <a title="ダウンロード" aria-label="ダウンロード">↓</a>
        <button class="delete-file" title="削除" aria-label="削除">×</button>
      </div>
    </article>
  </template>
  <script src="/qrcode.js"></script>
  <script src="/app.js"></script>
</body>
</html>
